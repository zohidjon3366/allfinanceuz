<!doctype html><html lang="uz"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ALL FINANCE kontent boshqaruvi</title><link rel="stylesheet" href="assets/css/admin.css"></head><body><main class="admin-shell"><section class="admin-head"><div><h1>Kontent boshqaruvi</h1><p>Jamoa va yangiliklarni boshqarish.</p></div><a class="btn secondary" href="index.html">Saytga qaytish</a></section><div class="admin-grid"><section class="panel"><h2>Jamoa</h2><form id="teamForm" class="fields"><label class="field"><span>F.I.Sh.</span><input name="name" required></label><label class="field"><span>Lavozim</span><input name="role" required></label><label class="field"><span>Yo‘nalish</span><select name="category"><option value="accounting">Buxgalteriya</option><option value="tax">Soliq</option><option value="audit">Audit</option><option value="it">1C va IT</option></select></label><label class="field"><span>Faoliyat boshlangan yil</span><input name="startYear" type="number" value="2018" required></label><label class="field full"><span>Mutaxassislik</span><textarea name="specialty" required></textarea></label><label class="field full"><span>Surat</span><input name="photo" type="file" accept="image/*"></label><div class="actions full"><button class="btn" type="submit">Ro‘yxatga qo‘shish</button><button class="btn secondary" type="button" id="downloadTeam">team-data.js yuklash</button></div></form><div class="status" id="teamStatus"></div><div class="list" id="teamAdminList"></div></section><section class="panel"><h2>Yangiliklar</h2><form id="newsForm" class="fields"><label class="field"><span>Sarlavha</span><input name="title" required></label><label class="field"><span>Bo‘lim</span><input name="category" value="Soliq" required></label><label class="field"><span>Sana</span><input name="date" type="date" required></label><label class="field"><span>O‘qish vaqti</span><input name="readTime" value="4 daqiqa"></label><label class="field full"><span>Qisqa matn</span><textarea name="excerpt" required></textarea></label><label class="field full"><span>Maqola matni — har paragrafni yangi qatordan yozing</span><textarea name="content" required></textarea></label><label class="field full"><span>Muqova rasmi</span><input name="cover" type="file" accept="image/*"></label><div class="actions full"><button class="btn" type="submit">Yangilik qo‘shish</button><button class="btn secondary" type="button" id="downloadNews">news-data.js yuklash</button></div></form><div class="status" id="newsStatus"></div><div class="list" id="newsAdminList"></div></section></div><section class="guide"><strong>Ishlash tartibi:</strong> ma’lumotni qo‘shing, tegishli JS faylni yuklab oling va GitHub’dagi <code>assets/js/</code> papkasidagi eski fayl o‘rniga yuklang. Render saytni avtomatik yangilaydi.</section></main><script src="assets/js/team-data.js"></script><script src="assets/js/news-data.js"></script><script src="assets/js/content-admin.js"></script></body></html>
