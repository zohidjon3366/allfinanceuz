<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yangiliklar boshqaruvi — ALL FINANCE</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="../assets/img/favicon-64.png">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <main class="admin-shell">
    <section id="loginView" class="login-view">
      <div class="login-card">
        <img src="../assets/img/logo-horizontal.png" alt="ALL FINANCE" class="admin-logo">
        <div class="eyebrow">Himoyalangan boshqaruv paneli</div>
        <h1>Yangiliklar boshqaruvi</h1>
        <p>Yangilik qo‘shish, tahrirlash, qoralama saqlash va o‘chirish uchun administrator parolini kiriting.</p>
        <form id="loginForm">
          <label>Administrator paroli<input id="password" type="password" autocomplete="current-password" required></label>
          <button type="submit" class="primary-btn">Kirish</button>
          <div id="loginMessage" class="message"></div>
        </form>
      </div>
    </section>

    <section id="panelView" class="panel-view hidden">
      <header class="admin-header">
        <div class="brand-row"><img src="../assets/img/logo-horizontal.png" alt="ALL FINANCE"><div><strong>Yangiliklar boshqaruvi</strong><span>Sayt dizayniga tegmasdan kontentni boshqaring</span></div></div>
        <div class="header-actions"><a href="../yangiliklar.html" target="_blank" class="ghost-btn">Saytni ko‘rish</a><button id="exportBtn" class="ghost-btn">Zaxira nusxa</button><button id="logoutBtn" class="danger-outline">Chiqish</button></div>
      </header>

      <div class="admin-grid">
        <section class="editor-card">
          <div class="card-heading"><div><span class="eyebrow">Muharrir</span><h2 id="formTitle">Yangi yangilik</h2></div><button id="newBtn" class="ghost-btn" type="button">+ Yangi</button></div>
          <form id="newsForm">
            <input type="hidden" id="editingId">
            <div class="two-col">
              <label>Sarlavha<input id="title" maxlength="180" required placeholder="Masalan: QQS hisobotida muhim nazorat nuqtalari"></label>
              <label>Kategoriya<input id="category" maxlength="60" required list="categoryList" placeholder="Soliq"></label>
              <datalist id="categoryList"><option value="Soliq"><option value="Buxgalteriya"><option value="Audit"><option value="1C"><option value="Kadrlar"><option value="Moliya"></datalist>
              <label>Nashr sanasi<input id="date" type="date" required></label>
              <label>Holati<select id="status"><option value="published">Nashr qilingan</option><option value="draft">Qoralama</option></select></label>
            </div>
            <label>Qisqa tavsif<textarea id="excerpt" maxlength="500" required rows="3" placeholder="Yangilik kartasida chiqadigan qisqa izoh"></textarea></label>
            <label>To‘liq maqola matni<textarea id="contentText" required rows="13" placeholder="Har bir paragrafni yangi qatordan yozing.

## Sarlavha — kichik bo‘lim sarlavhasi
- Ro‘yxat bandi"></textarea><small>Yangi paragraf uchun bo‘sh qator, kichik sarlavha uchun <b>##</b>, ro‘yxat uchun <b>-</b> belgisi ishlatiladi.</small></label>
            <div class="image-row">
              <label class="file-label">Maqola rasmi (ixtiyoriy)<input id="imageFile" type="file" accept="image/png,image/jpeg,image/webp"><span>PNG, JPG yoki WEBP — 3 MB gacha</span></label>
              <div id="imagePreviewWrap" class="image-preview hidden"><img id="imagePreview" alt="Rasm preview"><button id="removeImageBtn" type="button">Rasmni olib tashlash</button></div>
            </div>
            <div class="form-actions"><button id="previewBtn" type="button" class="ghost-btn">Ko‘rib chiqish</button><button type="submit" class="primary-btn">Saqlash</button></div>
            <div id="formMessage" class="message"></div>
          </form>
        </section>

        <aside class="list-card">
          <div class="card-heading"><div><span class="eyebrow">Maqolalar</span><h2>Mavjud yangiliklar</h2></div><span id="newsCount" class="count-badge">0</span></div>
          <div class="filter-row"><input id="searchInput" type="search" placeholder="Yangilikni qidirish"><select id="statusFilter"><option value="all">Barchasi</option><option value="published">Nashr qilingan</option><option value="draft">Qoralama</option></select></div>
          <div id="newsList" class="news-list"></div>
        </aside>
      </div>
    </section>
  </main>

  <dialog id="previewDialog" class="preview-dialog"><button id="closePreview" class="dialog-close" type="button">×</button><article id="previewArticle"></article></dialog>
  <script src="../assets/js/admin-news.js"></script>
</body>
</html>
