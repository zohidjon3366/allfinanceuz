services:
  - type: web
    name: allfinanceuz
    runtime: node
    buildCommand: node scripts/verify-build.js
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATA_DIR
        value: /var/data/allfinance
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: BACKUP_RETENTION_WEEKS
        value: 8
