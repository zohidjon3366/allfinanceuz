<!--
Bu kodni Tilda'dagi har bir maxsus embed sahifaning ENG PASTIGA
T123 — HTML-kod blokida joylashtiring.
Sahifalar: yangiliklar, jamoa, konsultatsiya formasi.
-->
<style>
html,body,#allrecords,.t-records{
  margin:0!important;
  padding:0!important;
  background:#eef2f8!important;
  color:#121936!important;
}
body,h1,h2,h3,h4,h5,h6,p,span,a,div,label,
.t-title,.t-descr,.t-text,.t-name,.t-uptitle,.t-heading,
.t-form__inputsbox,.t-input-title,.t-input-subtitle{
  color:#121936!important;
}
.t-btn,.t-submit{
  color:#121936!important;
  background:linear-gradient(135deg,#dfe4ff,#cfeede,#f4e8d2)!important;
  border:1px solid rgba(69,70,157,.18)!important;
  border-radius:14px!important;
  box-shadow:none!important;
}
.t-input,.t-select,.t-input-block textarea{
  color:#121936!important;
  background:#f5f7fc!important;
  border-color:rgba(69,70,157,.16)!important;
}
.t-card__title,.t-card__descr,.t-feed__post-title,.t-feed__post-descr{
  color:#121936!important;
}
</style>
<script>
(function(){
  function reportHeight(){
    var params=new URLSearchParams(location.search);
    var id=params.get('af_embed')||'content';
    var height=Math.max(
      document.documentElement.scrollHeight||0,
      document.body.scrollHeight||0,
      document.documentElement.offsetHeight||0
    );
    parent.postMessage({type:'allfinance-tilda-height',id:id,height:height+20},'*');
  }
  window.addEventListener('load',function(){setTimeout(reportHeight,300);setTimeout(reportHeight,1200)});
  window.addEventListener('resize',reportHeight);
  if(window.ResizeObserver){new ResizeObserver(reportHeight).observe(document.body)}
  setInterval(reportHeight,2500);
})();
</script>
