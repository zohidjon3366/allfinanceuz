<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-label="四阶段工作方法">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#eef5fb"/><stop offset="100%" stop-color="#eff7f3"/></linearGradient>
    <linearGradient id="head" x1="0" x2="1"><stop offset="0%" stop-color="#153f92"/><stop offset="100%" stop-color="#19a56f"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#9eb4c9" flood-opacity="0.28"/></filter>
    <style>
      text{font-family:Inter,Segoe UI,Arial,sans-serif; fill:#16315f}
      .title{font-size:38px; font-weight:800}
      .sub{font-size:18px; fill:#5c7395}
      .stepnum{font-size:15px; font-weight:800; fill:#fff}
      .steptitle{font-size:22px; font-weight:800}
      .stepdesc{font-size:14px; fill:#5d7391}
      .brand{font-size:14px; font-weight:700; letter-spacing:2px; fill:#d9f1e6}
    </style>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <g opacity="0.28"><circle cx="110" cy="92" r="56" fill="#d9e8f5"/><circle cx="1110" cy="112" r="74" fill="#d9efe5"/><circle cx="1045" cy="700" r="86" fill="#dce9f8"/></g>
  <rect x="44" y="42" width="1112" height="736" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="88" y="82" width="1024" height="108" rx="24" fill="url(#head)"/>
  <text x="140" y="128" class="title" fill="#fff">四阶段工作方法</text>
  <text x="140" y="160" class="sub" fill="#e9f3ff">每个项目都围绕文件、期限和清晰成果进行管理</text>
  <text x="1042" y="128" class="brand" text-anchor="end">ALL FINANCE</text>
  <g stroke="#89b2df" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M228 360 C288 296, 326 280, 390 280"/>
    <path d="M480 280 L660 280"/>
    <path d="M790 290 C880 310, 902 338, 972 418"/>
  </g>
  <g fill="#89b2df">
    <path d="M390 280 l-18 -10 l3 10 l-3 10z"/>
    <path d="M660 280 l-18 -10 l3 10 l-3 10z"/>
    <path d="M972 418 l-18 -10 l3 10 l-3 10z"/>
  </g>
  <g>
    <circle cx="170" cy="398" r="46" fill="#fff" stroke="#e6eef7" stroke-width="10"/>
    <circle cx="170" cy="398" r="34" fill="#214d9a"/>
    <text x="170" y="396" class="stepnum" text-anchor="middle">1</text>
    <rect x="78" y="488" width="184" height="112" rx="22" fill="#f8fbfe" stroke="#e6eef7"/>
    <text x="170" y="522" class="steptitle" text-anchor="middle">诊断</text>
    <text x="170" y="558" class="stepdesc" text-anchor="middle">审查文件与风险</text>
  </g>
  <g>
    <circle cx="420" cy="270" r="46" fill="#fff" stroke="#e6eef7" stroke-width="10"/>
    <circle cx="420" cy="270" r="34" fill="#1c7a96"/>
    <text x="420" y="268" class="stepnum" text-anchor="middle">2</text>
    <rect x="328" y="412" width="184" height="112" rx="22" fill="#f8fbfe" stroke="#e6eef7"/>
    <text x="420" y="446" class="steptitle" text-anchor="middle">规划</text>
    <text x="420" y="482" class="stepdesc" text-anchor="middle">明确范围与期限</text>
  </g>
  <g>
    <circle cx="720" cy="270" r="46" fill="#fff" stroke="#e6eef7" stroke-width="10"/>
    <circle cx="720" cy="270" r="34" fill="#1aa36d"/>
    <text x="720" y="268" class="stepnum" text-anchor="middle">3</text>
    <rect x="628" y="412" width="184" height="112" rx="22" fill="#f8fbfe" stroke="#e6eef7"/>
    <text x="720" y="446" class="steptitle" text-anchor="middle">实施</text>
    <text x="720" y="482" class="stepdesc" text-anchor="middle">按步骤执行任务</text>
  </g>
  <g>
    <circle cx="1020" cy="398" r="46" fill="#fff" stroke="#e6eef7" stroke-width="10"/>
    <circle cx="1020" cy="398" r="34" fill="#1f6fb2"/>
    <text x="1020" y="396" class="stepnum" text-anchor="middle">4</text>
    <rect x="928" y="488" width="184" height="112" rx="22" fill="#f8fbfe" stroke="#e6eef7"/>
    <text x="1020" y="522" class="steptitle" text-anchor="middle">成果</text>
    <text x="1020" y="558" class="stepdesc" text-anchor="middle">提交报告与建议</text>
  </g>
  <g opacity="0.9"><rect x="90" y="688" width="1020" height="48" rx="18" fill="#f7fafc" stroke="#e4edf7"/><text x="600" y="718" class="sub" text-anchor="middle">ALL FINANCE — professional financial services</text></g>
</svg>